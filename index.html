  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Penanganan Notch iPhone */
    header {
      padding-top: max(1rem, env(safe-area-inset-top));
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>

<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Icon = ({ name, className }) => {
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [name]);
      return <i data-lucide={name} className={className}></i>;
    };

    const MAINTENANCE_DEFAULTS = [
      { id: 'oil', name: 'Oli Mesin', interval: 4000, icon: 'droplets', color: 'bg-amber-500' },
      { id: 'spark', name: 'Busi', interval: 8000, icon: 'zap', color: 'bg-blue-500' },
      { id: 'air', name: 'Filter Udara', interval: 16000, icon: 'wind', color: 'bg-teal-500' },
      { id: 'chain', name: 'Rantai Roda', interval: 1000, icon: 'settings', color: 'bg-slate-600' },
      { id: 'brake', name: 'Kampas Rem', interval: 4000, icon: 'disc', color: 'bg-rose-500' },
      { id: 'valve', name: 'Celah Klep', interval: 4000, icon: 'wrench', color: 'bg-indigo-500' },
    ];

    function App() {
      const [currentOdo, setCurrentOdo] = useState(0);
      const [tempOdo, setTempOdo] = useState("");
      const [logs, setLogs] = useState({});
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');

      useEffect(() => {
        const savedOdo = localStorage.getItem('revo_odo');
        const savedLogs = localStorage.getItem('revo_logs');
        if (savedOdo) {
          const odo = parseInt(savedOdo);
          setCurrentOdo(odo);
          setTempOdo(odo.toString());
        }
        if (savedLogs) setLogs(JSON.parse(savedLogs));
        setLoading(false);
      }, []);

      const updateOdo = () => {
        const newOdo = parseInt(tempOdo);
        if (isNaN(newOdo)) return;
        setCurrentOdo(newOdo);
        localStorage.setItem('revo_odo', newOdo.toString());
      };

      const resetMaintenance = (item) => {
        const newLogs = {
          ...logs,
          [item.id]: {
            lastServiceAt: currentOdo,
            updatedAt: new Date().toISOString()
          }
        };
        setLogs(newLogs);
        localStorage.setItem('revo_logs', JSON.stringify(newLogs));
      };

      const statusList = useMemo(() => {
        return MAINTENANCE_DEFAULTS.map(item => {
          const log = logs[item.id] || { lastServiceAt: 0 };
          const kmSinceService = currentOdo - log.lastServiceAt;
          const remaining = item.interval - kmSinceService;
          const percentUsed = Math.min(100, Math.max(0, (kmSinceService / item.interval) * 100));
          let status = "aman";
          if (percentUsed >= 90) status = "bahaya";
          else if (percentUsed >= 75) status = "peringatan";
          return { ...item, kmSinceService, remaining, percentUsed, status };
        });
      }, [currentOdo, logs]);

      if (loading) return <div className="flex h-screen items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div></div>;

      return (
        <div className="min-h-screen pb-24 max-w-md mx-auto">
          <header className="bg-white border-b sticky top-0 z-10 px-6 py-4 flex justify-between items-center shadow-sm">
            <div className="flex items-center gap-2">
              <div className="bg-indigo-600 p-2 rounded-lg text-white shadow-md">
                <Icon name="settings" className="w-5 h-5" />
              </div>
              <h1 className="font-black text-xl italic tracking-tight uppercase text-slate-900">RevoTrack</h1>
            </div>
          </header>

          <main className="p-4 space-y-6">
            {/* Odometer Card Terintegrasi */}
            <div className="bg-white rounded-3xl p-6 shadow-sm border">
              <label className="text-xs font-bold text-slate-400 mb-3 block uppercase tracking-widest">
                Odometer Saat Ini (KM)
              </label>
              <div className="grid grid-cols-[minmax(0,1fr)_auto] items-center gap-2">
                <input
                  type="number"
                  value={tempOdo}
                  onChange={(e) => setTempOdo(e.target.value)}
                  className="min-w-0 bg-slate-100 rounded-2xl text-2xl font-black px-4 py-3.5 outline-none text-slate-800 focus:ring-2 focus:ring-indigo-500/20 border border-transparent focus:border-indigo-500/30"
                  placeholder="0"
                />
                <button
                  onClick={updateOdo}
                  className={`shrink-0 w-14 h-[52px] rounded-2xl transition-all flex items-center justify-center font-black text-xs border ${parseInt(tempOdo) !== currentOdo ? "bg-indigo-600 text-white border-indigo-600 active:scale-[0.98]" : "bg-slate-200 text-slate-600 border-slate-300"}`}
                >
                  <Icon name="save" className="w-4 h-4" />
                </button>
              </div>
            </div>

            <div className="space-y-4">
              <h2 className="text-sm font-black text-slate-400 uppercase tracking-widest px-1">Status Perawatan</h2>
              {statusList.map(item => (
                <div key={item.id} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 group transition-all active:bg-slate-50">
                  <div className="flex justify-between items-start mb-4">
                    <div className="flex items-center gap-3">
                      <div className={`${item.color} p-3 rounded-2xl text-white shadow-lg shadow-current/20 flex items-center justify-center`}><Icon name={item.icon} className="w-5 h-5" /></div>
                      <div>
                        <h3 className="font-bold text-slate-800">{item.name}</h3>
                        <p className="text-[10px] text-slate-400 font-bold uppercase">{item.interval} KM</p>
                      </div>
                    </div>
                    <div className={`text-[10px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider ${item.status === 'bahaya' ? 'bg-red-500 text-white' : item.status === 'peringatan' ? 'bg-amber-400 text-white' : 'bg-emerald-500 text-white'}`}>
                      {item.status === 'aman' ? 'Baik' : item.status === 'peringatan' ? 'Cek' : 'Ganti'}
                    </div>
                  </div>
                  <div className="space-y-2.5 text-[11px] font-bold">
                    <div className="flex justify-between">
                      <span className="text-slate-400 uppercase tracking-tight">TERPAKAI: {item.kmSinceService} KM</span>
                      <span className={item.remaining <= 0 ? "text-red-500" : "text-slate-500"}>
                        {item.remaining <= 0 ? 'TERLEWAT!' : `SISA ${item.remaining} KM`}
                      </span>
                    </div>
                    <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                      <div className={`h-full transition-all duration-1000 ease-out ${item.percentUsed >= 90 ? 'bg-red-500' : item.percentUsed >= 75 ? 'bg-amber-400' : 'bg-emerald-500'}`} style={{ width: `${item.percentUsed}%` }}></div>
                    </div>
                  </div>
                  <button
                    onClick={() => { if (confirm(`Konfirmasi reset ${item.name}?`)) resetMaintenance(item) }}
                    className="mt-5 w-full py-2.5 bg-slate-50 hover:bg-slate-100 text-slate-500 hover:text-slate-700 text-[11px] font-black uppercase tracking-widest rounded-xl border border-dashed border-slate-200 transition-all active:scale-[0.98]"
                  >
                    Update Service Baru
                  </button>
                </div>
              ))}
            </div>
          </main>

          {/* Navigasi Bawah */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t px-12 py-4 pb-8 flex justify-between items-center z-20">
            <button onClick={() => setActiveTab('dashboard')} className={`transition-all ${activeTab === 'dashboard' ? 'text-indigo-600 scale-110' : 'text-slate-300'}`}>
              <Icon name="wrench" className="w-6 h-6" />
            </button>

            <div className="relative">
              <button
                onClick={() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                className="bg-indigo-600 text-white p-4 rounded-2xl shadow-xl shadow-indigo-200 -mt-12 border-4 border-white active:scale-90 transition-all"
              >
                <Icon name="plus" className="w-7 h-7" />
              </button>
            </div>

            <button onClick={() => setActiveTab('history')} className={`transition-all ${activeTab === 'history' ? 'text-indigo-600 scale-110' : 'text-slate-300'}`}>
              <Icon name="history" className="w-6 h-6" />
            </button>
          </nav>

          {/* Riwayat Overlay */}
          {activeTab === 'history' && (
            <div className="fixed inset-0 bg-white z-50 p-6 overflow-y-auto animate-in slide-in-from-bottom duration-300">
              <div className="max-w-md mx-auto">
                <div className="flex justify-between items-center mb-10">
                  <h2 className="text-3xl font-black italic uppercase text-slate-900 tracking-tighter">Riwayat Log</h2>
                  <button onClick={() => setActiveTab('dashboard')} className="p-3 bg-slate-100 rounded-full active:scale-90 transition-all text-slate-500">
                    <Icon name="x" className="w-6 h-6" />
                  </button>
                </div>

                <div className="space-y-4">
                  {Object.keys(logs).length === 0 ? (
                    <div className="text-center py-24 flex flex-col items-center gap-4">
                      <Icon name="clipboard-list" className="w-12 h-12 text-slate-200" />
                      <p className="text-slate-300 font-black uppercase italic tracking-widest">Belum ada riwayat</p>
                    </div>
                  ) : (
                    Object.keys(logs).sort((a, b) => new Date(logs[b].updatedAt) - new Date(logs[a].updatedAt)).map(id => {
                      const item = MAINTENANCE_DEFAULTS.find(d => d.id === id);
                      const date = new Date(logs[id].updatedAt).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                      return (
                        <div key={id} className="flex items-center gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                          <div className={`${item?.color || 'bg-slate-500'} p-3 rounded-2xl text-white shadow-md shadow-current/20`}><Icon name={item?.icon || 'settings'} className="w-5 h-5" /></div>
                          <div className="flex-1">
                            <p className="font-bold text-slate-800">{item?.name || id}</p>
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-tight">{date} • Reset pada {logs[id].lastServiceAt} KM</p>
                          </div>
                        </div>
                      )
                    })
                  )}
                </div>

                <button
                  onClick={() => setActiveTab('dashboard')}
                  className="mt-12 w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all"
                >
                  Kembali
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
